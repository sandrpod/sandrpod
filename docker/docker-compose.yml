# Server + Poder 部署（拉取 GHCR 发布镜像；从源码构建请用 docker-compose.local.yml）

services:
  server:
    image: ghcr.io/sandrpod/server:latest
    container_name: sandrpod-server
    ports:
      - "18080:8080"
    networks:
      - sandrpod
    environment:
      - PORT=8080
      - TOKEN=${SANDRPOD_TOKEN:-}
      - OFFLINE_TIMEOUT=${OFFLINE_TIMEOUT:-30s}
      - PUBLIC_URL=${SANDRPOD_PUBLIC_URL:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  poder:
    image: ghcr.io/sandrpod/poder:latest
    container_name: sandrpod-poder
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - sandrpod
    environment:
      - API_URL=http://server:8080
      - REGION=${REGION:-local}
      - PROVIDER_TYPE=${PROVIDER_TYPE:-local}
      - SANDRPOD_TOKEN=${SANDRPOD_TOKEN:-}
      - SANDRPOD_TOOLBOX_IMAGE=${SANDRPOD_TOOLBOX_IMAGE:-ghcr.io/sandrpod/toolbox:latest}
    depends_on:
      - server
    restart: unless-stopped

networks:
  sandrpod:
    name: sandrpod
