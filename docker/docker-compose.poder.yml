# Poder 部署配置
# 部署在每台 Worker 节点

services:
  poder:
    build:
      context: ..
      dockerfile: docker/Dockerfile.poder
    container_name: sandrpod-poder
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock  # Docker socket
    networks:
      - sandrpod
    environment:
      - API_URL=${SANDRPOD_API_URL:-http://api:8080}
      - REGION=${REGION:-local}
      - PROVIDER_TYPE=${PROVIDER_TYPE:-local}
      - SANDRPOD_TOKEN=${SANDRPOD_TOKEN:-}
      - POLL_INTERVAL=${POLL_INTERVAL:-5s}
    restart: unless-stopped

networks:
  sandrpod:
    name: sandrpod
    external: true
