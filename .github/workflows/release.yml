name: Release

# On a v* tag: publish CGO-free release binaries AND multi-arch container
# images to GHCR (ghcr.io/<owner>/{server,poder,toolbox,toolbox-centos}).
# CGO binaries (sandrpod-tray) are excluded — they need platform toolchains
# and are built/distributed separately.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # create the GitHub Release
  packages: write # push images to GHCR

jobs:
  binaries:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      - name: Build release binaries
        run: |
          set -euo pipefail
          mkdir -p dist
          VERSION="${GITHUB_REF_NAME}"
          LDFLAGS="-s -w -X main.version=${VERSION}"

          # API server (linux only — it's the control plane).
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -ldflags="${LDFLAGS}" -o dist/server-linux-amd64 ./cmd/server

          # sandrpod-agent: full platform matrix.
          for tgt in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64 windows/arm64; do
            os="${tgt%/*}"; arch="${tgt#*/}"
            out="dist/sandrpod-agent-${os}-${arch}"
            [ "$os" = "windows" ] && out="${out}.exe"
            CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" \
              go build -ldflags="${LDFLAGS}" -o "$out" ./cmd/agent
          done

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/server-linux-amd64
            dist/sandrpod-agent-*
            dist/SHA256SUMS.txt
          generate_release_notes: true

  images:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: server
            dockerfile: docker/Dockerfile.server
            platforms: linux/amd64,linux/arm64
          - name: poder
            dockerfile: docker/Dockerfile.poder
            platforms: linux/amd64,linux/arm64
          - name: toolbox
            dockerfile: docker/Dockerfile.toolbox
            platforms: linux/amd64,linux/arm64
          # CentOS image is amd64-only here: building it for arm64 under QEMU
          # emulation is slow enough to risk CI timeouts.
          - name: toolbox-centos
            dockerfile: docker/Dockerfile.toolbox.centos
            platforms: linux/amd64
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image ref (GHCR requires a lowercase path)
        id: ref
        run: |
          owner="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          echo "image=ghcr.io/${owner}/${{ matrix.name }}" >> "$GITHUB_OUTPUT"

      - name: Build & push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platforms }}
          push: true
          build-args: |
            VERSION=${{ github.ref_name }}
          tags: |
            ${{ steps.ref.outputs.image }}:${{ github.ref_name }}
            ${{ steps.ref.outputs.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
