name: Release

# Build CGO-free release binaries and publish them on a tagged release.
# CGO binaries (sandrpod-tray) are intentionally excluded — they need
# platform toolchains and are built/distributed separately.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # required to create the GitHub Release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build release binaries
        run: |
          set -euo pipefail
          mkdir -p dist
          VERSION="${GITHUB_REF_NAME}"
          LDFLAGS="-s -w -X main.version=${VERSION}"

          # API server (linux only — it's the control plane).
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -ldflags="${LDFLAGS}" -o dist/server-linux-amd64 ./cmd/server

          # sandrpod-agent: full platform matrix.
          for tgt in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64 windows/arm64; do
            os="${tgt%/*}"; arch="${tgt#*/}"
            out="dist/sandrpod-agent-${os}-${arch}"
            [ "$os" = "windows" ] && out="${out}.exe"
            CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" \
              go build -ldflags="${LDFLAGS}" -o "$out" ./cmd/agent
          done

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/server-linux-amd64
            dist/sandrpod-agent-*
            dist/SHA256SUMS.txt
          generate_release_notes: true
