name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      # sandrpod-tray uses getlantern/systray, which needs CGO + GTK headers
      # on Linux — without these, `go build ./...` fails on cmd/sandrpod-tray.
      - name: Install GTK headers (sandrpod-tray)
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q libgtk-3-dev libayatana-appindicator3-dev

      - name: Verify dependencies
        run: go mod verify

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test (with race detector)
        run: go test -race -timeout 300s ./...

      - name: Cross-compile agent (linux/amd64)
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -ldflags="-s -w" -o /dev/null ./cmd/agent

      - name: Cross-compile agent (linux/arm64)
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 \
            go build -ldflags="-s -w" -o /dev/null ./cmd/agent

      - name: Cross-compile server (linux/amd64)
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -ldflags="-s -w" -o /dev/null ./cmd/server
