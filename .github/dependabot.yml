version: 2
updates:
  # Go modules (root).
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      go-dependencies:
        patterns:
          - "*"

  # GitHub Actions used by CI / release workflows.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  # Toolbox / server / poder base images.
  - package-ecosystem: "docker"
    directory: "/docker"
    schedule:
      interval: "weekly"

  # Python SDK (langchain-sandrpod).
  - package-ecosystem: "pip"
    directory: "/pkg/sdk/python/langchain_sandrpod"
    schedule:
      interval: "weekly"
