<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SandrPod 架构图</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            padding: 40px;
        }

        h1 {
            font-size: 36px;
            font-weight: 600;
            margin-bottom: 60px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .architecture {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .box {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 40px;
            border-radius: 20px;
            min-width: 180px;
        }

        .box-client {
            background: linear-gradient(135deg, rgba(236, 72, 153, 0.15), rgba(236, 72, 153, 0.05));
            border: 2px solid rgba(236, 72, 153, 0.4);
        }

        .box-server {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.15), rgba(99, 102, 241, 0.05));
            border: 2px solid rgba(99, 102, 241, 0.4);
        }

        .box-poder {
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.15), rgba(245, 158, 11, 0.05));
            border: 2px solid rgba(245, 158, 11, 0.4);
        }

        .box-toolbox {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.15), rgba(16, 185, 129, 0.05));
            border: 2px solid rgba(16, 185, 129, 0.4);
        }

        .box-cloud {
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.15), rgba(139, 92, 246, 0.05));
            border: 2px dashed rgba(139, 92, 246, 0.4);
        }

        .box-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .box-title {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .box-desc {
            font-size: 14px;
            color: #94a3b8;
            text-align: center;
        }

        .arrow {
            font-size: 32px;
            color: #6366f1;
            opacity: 0.8;
        }

        .arrow-down {
            display: none;
        }

        .cloud-section {
            margin-top: 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .cloud-label {
            font-size: 18px;
            color: #8b5cf6;
            margin-bottom: 20px;
        }

        .cloud-icons {
            display: flex;
            gap: 40px;
        }

        .cloud-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            color: #94a3b8;
            font-size: 16px;
        }

        .cloud-item span:first-child {
            font-size: 36px;
        }

        @media (max-width: 900px) {
            .architecture {
                flex-direction: column;
            }
            .arrow {
                display: none;
            }
            .arrow-down {
                display: block;
                font-size: 28px;
                color: #6366f1;
                margin: 10px 0;
            }
        }
    </style>
</head>
<body>
    <h1>SandrPod 系统架构</h1>

    <div class="architecture">
        <div class="box box-client">
            <div class="box-icon">👤</div>
            <div class="box-title">Client</div>
            <div class="box-desc">CLI / Python SDK</div>
        </div>

        <div class="arrow">→</div>

        <div class="box box-server">
            <div class="box-icon">🎛️</div>
            <div class="box-title">API Server</div>
            <div class="box-desc">Control Plane<br>:18080</div>
        </div>

        <div class="arrow">→</div>

        <div class="box box-poder">
            <div class="box-icon">🔄</div>
            <div class="box-title">Poder</div>
            <div class="box-desc">Proxy + Agent<br>Worker Node</div>
        </div>

        <div class="arrow-down">↓</div>

        <div class="box box-toolbox">
            <div class="box-icon">🧰</div>
            <div class="box-title">Toolbox</div>
            <div class="box-desc">Sandbox Container<br>Code Executor</div>
        </div>
    </div>

    <div class="cloud-section">
        <div class="cloud-label">Multi-Cloud Provider Support</div>
        <div class="cloud-icons">
            <div class="cloud-item">
                <span>☁️</span>
                <span>AWS</span>
            </div>
            <div class="cloud-item">
                <span>🅰️</span>
                <span>Aliyun</span>
            </div>
            <div class="cloud-item">
                <span>🐳</span>
                <span>Docker</span>
            </div>
        </div>
    </div>
</body>
</html>
