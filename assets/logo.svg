<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <defs>
    <linearGradient id="podGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#06B6D4"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E3A5F;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0F2040;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Icon: Pod shape (rounded hexagon) -->
  <g transform="translate(8, 8)">
    <!-- Outer pod shell -->
    <path d="M32 0 L52 10 L52 54 L32 64 L12 54 L12 10 Z"
          fill="url(#glowGrad)"
          stroke="url(#podGrad)"
          stroke-width="1.5"/>

    <!-- Inner grid lines (sandbox feel) -->
    <line x1="12" y1="22" x2="52" y2="22" stroke="#3B82F6" stroke-width="0.6" stroke-opacity="0.4"/>
    <line x1="12" y1="32" x2="52" y2="32" stroke="#3B82F6" stroke-width="0.6" stroke-opacity="0.4"/>
    <line x1="12" y1="42" x2="52" y2="42" stroke="#3B82F6" stroke-width="0.6" stroke-opacity="0.4"/>
    <line x1="25" y1="4" x2="25" y2="60" stroke="#3B82F6" stroke-width="0.6" stroke-opacity="0.4"/>
    <line x1="39" y1="4" x2="39" y2="60" stroke="#3B82F6" stroke-width="0.6" stroke-opacity="0.4"/>

    <!-- Code prompt symbol -->
    <text x="32" y="38" font-family="'SF Mono', 'Fira Code', monospace" font-size="18"
          fill="url(#podGrad)" text-anchor="middle" font-weight="bold" filter="url(#glow)">⌥</text>

    <!-- Corner accent dots -->
    <circle cx="32" cy="6"  r="2" fill="#06B6D4" opacity="0.9"/>
    <circle cx="32" cy="58" r="2" fill="#3B82F6" opacity="0.9"/>
    <circle cx="14" cy="16" r="1.5" fill="#06B6D4" opacity="0.6"/>
    <circle cx="50" cy="16" r="1.5" fill="#06B6D4" opacity="0.6"/>
    <circle cx="14" cy="48" r="1.5" fill="#3B82F6" opacity="0.6"/>
    <circle cx="50" cy="48" r="1.5" fill="#3B82F6" opacity="0.6"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(78, 0)">
    <!-- "Sandr" in white -->
    <text x="0" y="52" font-family="-apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif"
          font-size="36" font-weight="700" letter-spacing="-0.5"
          fill="#F1F5F9">Sandr</text>
    <!-- "Pod" in gradient -->
    <text x="103" y="52" font-family="-apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif"
          font-size="36" font-weight="700" letter-spacing="-0.5"
          fill="url(#podGrad)">Pod</text>

    <!-- Tagline -->
    <text x="1" y="68" font-family="-apple-system, 'SF Pro Text', sans-serif"
          font-size="11" font-weight="400" letter-spacing="2.5"
          fill="#64748B">AI SANDBOX INFRASTRUCTURE</text>
  </g>
</svg>
