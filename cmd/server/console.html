<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>SandrPod Console</title>
<style>
  :root {
    --bg: oklch(21% 0.03 264);
    --surface: oklch(26% 0.035 264);
    --surface-2: oklch(30% 0.04 264);
    --line: oklch(38% 0.03 264);
    --text: oklch(96% 0.01 264);
    --muted: oklch(72% 0.02 264);
    --accent: oklch(72% 0.16 190);
    --accent-ink: oklch(20% 0.05 190);
    --danger: oklch(66% 0.2 20);
    --ok: oklch(74% 0.17 150);
    --warn: oklch(80% 0.15 85);
    --radius: 12px;
    --mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: var(--sans); color: var(--text);
    background:
      radial-gradient(1200px 600px at 85% -10%, oklch(30% 0.08 190 / 0.35), transparent 60%),
      radial-gradient(900px 500px at 5% 0%, oklch(30% 0.09 300 / 0.25), transparent 55%),
      var(--bg);
    min-height: 100vh;
  }
  header {
    display: flex; align-items: baseline; gap: 16px; flex-wrap: wrap;
    padding: 28px clamp(16px, 4vw, 48px) 8px;
  }
  header h1 { font-size: clamp(1.4rem, 1rem + 2vw, 2rem); margin: 0; letter-spacing: -0.02em; }
  header h1 span { color: var(--accent); }
  header .sub { color: var(--muted); font-size: 0.9rem; }
  main { padding: 8px clamp(16px, 4vw, 48px) 64px; max-width: 1200px; }
  .bar {
    display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
    margin: 18px 0 24px;
  }
  input, select, button {
    font: inherit; color: var(--text); border-radius: 10px;
    border: 1px solid var(--line); background: var(--surface); padding: 9px 12px;
  }
  input::placeholder { color: var(--muted); }
  input:focus, select:focus { outline: 2px solid var(--accent); outline-offset: 1px; }
  button {
    cursor: pointer; background: var(--surface-2); transition: transform .08s ease, background .15s ease, border-color .15s ease;
  }
  button:hover { border-color: var(--accent); }
  button:active { transform: translateY(1px); }
  button.primary { background: var(--accent); color: var(--accent-ink); border-color: transparent; font-weight: 600; }
  button.ghost { background: transparent; }
  button.danger:hover { border-color: var(--danger); color: var(--danger); }
  .token-row { margin-left: auto; display: flex; gap: 8px; align-items: center; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
  .card {
    background: linear-gradient(180deg, var(--surface), var(--surface-2));
    border: 1px solid var(--line); border-radius: var(--radius); padding: 16px 18px;
    display: flex; flex-direction: column; gap: 10px; position: relative; overflow: hidden;
  }
  .card::before {
    content: ""; position: absolute; inset: 0 auto 0 0; width: 3px; background: var(--muted);
  }
  .card[data-state="RUNNING"]::before { background: var(--ok); }
  .card[data-state="ERROR"]::before { background: var(--danger); }
  .card[data-state="PENDING"]::before, .card[data-state="STARTING"]::before { background: var(--warn); }
  .card h3 { margin: 0; font-size: 1.05rem; letter-spacing: -0.01em; }
  .pill {
    display: inline-flex; align-items: center; gap: 6px; font-size: 0.72rem;
    padding: 3px 9px; border-radius: 999px; border: 1px solid var(--line);
    text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted);
  }
  .pill .dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }
  .pill[data-state="RUNNING"] { color: var(--ok); }
  .pill[data-state="ERROR"] { color: var(--danger); }
  .pill[data-state="PENDING"], .pill[data-state="STARTING"] { color: var(--warn); }
  .meta { display: grid; grid-template-columns: auto 1fr; gap: 4px 12px; font-size: 0.82rem; color: var(--muted); }
  .meta b { color: var(--text); font-weight: 500; font-family: var(--mono); }
  .card-actions { display: flex; gap: 8px; margin-top: auto; }
  .card-actions button { padding: 6px 12px; font-size: 0.85rem; }
  .empty, .notice {
    border: 1px dashed var(--line); border-radius: var(--radius); padding: 40px;
    text-align: center; color: var(--muted);
  }
  .notice { border-style: solid; text-align: left; padding: 14px 18px; }
  .notice.err { border-color: var(--danger); color: oklch(82% 0.09 20); }
  dialog {
    border: 1px solid var(--line); border-radius: 16px; background: var(--surface);
    color: var(--text); padding: 0; width: min(440px, 92vw);
  }
  dialog::backdrop { background: oklch(10% 0.02 264 / 0.6); backdrop-filter: blur(3px); }
  dialog form { padding: 22px; display: flex; flex-direction: column; gap: 14px; }
  dialog h2 { margin: 0 0 4px; font-size: 1.2rem; }
  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label { font-size: 0.8rem; color: var(--muted); }
  .field input, .field select { width: 100%; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .dialog-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 6px; }
  .stat-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }
  .stat {
    background: var(--surface); border: 1px solid var(--line); border-radius: 10px;
    padding: 10px 16px; min-width: 96px;
  }
  .stat .n { font-size: 1.4rem; font-weight: 600; font-variant-numeric: tabular-nums; }
  .stat .l { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
  .spin { display: inline-block; width: 12px; height: 12px; border: 2px solid currentColor; border-right-color: transparent; border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* custom modals — replace native alert / prompt / confirm */
  dialog.app-modal { width: min(560px, 94vw); }
  .modal-body-wrap { padding: 22px; display: flex; flex-direction: column; gap: 14px; }
  .modal-label { font-size: 0.82rem; color: var(--muted); margin-top: -4px; }
  .modal-hint { font-size: 0.72rem; color: var(--muted); text-align: right; }
  .modal-input {
    width: 100%; font: inherit; color: var(--text); background: var(--surface-2);
    border: 1px solid var(--line); border-radius: 10px; padding: 10px 12px; resize: vertical;
  }
  .modal-input.mono { font-family: var(--mono); font-size: 0.9rem; }
  .modal-input:focus { outline: 2px solid var(--accent); outline-offset: 1px; }
  .modal-output {
    margin: 0; font-family: var(--mono); font-size: 0.85rem; line-height: 1.5;
    white-space: pre-wrap; word-break: break-word; color: var(--text);
    background: var(--bg); border: 1px solid var(--line); border-radius: 10px;
    padding: 12px 14px; max-height: 52vh; overflow: auto;
  }
  .modal-msg { margin: 0; color: var(--muted); font-size: 0.92rem; line-height: 1.5; }
  .modal-img { max-width: 100%; border-radius: 8px; background: #fff; border: 1px solid var(--line); display: block; }
  .modal-rich { background: #fff; color: #111; border-radius: 8px; padding: 10px 12px; overflow: auto; max-height: 52vh; font-size: 0.85rem; }
  .modal-rich table { border-collapse: collapse; }
  .modal-rich th, .modal-rich td { border: 1px solid #d0d0d0; padding: 4px 10px; text-align: right; }
  .modal-rich th { background: #f3f3f3; font-weight: 600; }
  dialog h2.err { color: oklch(82% 0.09 20); }
  button.danger-solid { background: var(--danger); color: oklch(22% 0.05 20); border-color: transparent; font-weight: 600; }
  button.danger-solid:hover { border-color: transparent; filter: brightness(1.08); }
  dialog[open] { animation: pop .14s ease; }
  @keyframes pop { from { transform: translateY(6px) scale(.985); opacity: 0; } to { transform: none; opacity: 1; } }
</style>
</head>
<body>
<header>
  <h1>Sandr<span>Pod</span></h1>
  <div class="sub">sandbox control plane</div>
  <div class="token-row">
    <input id="token" type="password" placeholder="API token (optional)" autocomplete="off" size="24" />
    <button id="saveToken" class="ghost" title="Store token for this tab only">Use token</button>
  </div>
</header>
<main>
  <div class="stat-row" id="stats"></div>
  <div class="bar">
    <button id="newBtn" class="primary">+ New sandbox</button>
    <button id="refreshBtn" class="ghost">Refresh</button>
    <span id="status" class="sub"></span>
  </div>
  <div id="list" class="grid"></div>
</main>

<dialog id="newDialog">
  <form method="dialog" id="newForm">
    <h2>New sandbox</h2>
    <div class="field">
      <label>Name</label>
      <input name="name" required placeholder="my-sandbox" pattern="[a-zA-Z0-9._-]+" />
    </div>
    <div class="row2">
      <div class="field">
        <label>Provider</label>
        <select name="provider_type">
          <option value="local">local</option>
          <option value="aws">aws</option>
          <option value="aliyun">aliyun</option>
          <option value="gcp">gcp</option>
          <option value="tencent">tencent</option>
          <option value="digitalocean">digitalocean</option>
          <option value="hetzner">hetzner</option>
          <option value="oracle">oracle</option>
          <option value="azure">azure</option>
        </select>
      </div>
      <div class="field">
        <label>Region</label>
        <input name="region" placeholder="local" value="local" />
      </div>
    </div>
    <div class="row2">
      <div class="field">
        <label>Instance type</label>
        <input name="instance_type" placeholder="(provider default)" />
      </div>
      <div class="field">
        <label>Image (optional)</label>
        <input name="image_id" placeholder="(poder default)" />
      </div>
    </div>
    <div class="dialog-actions">
      <button value="cancel" class="ghost" type="button" id="cancelNew">Cancel</button>
      <button value="create" class="primary">Create</button>
    </div>
  </form>
</dialog>

<script>
const $ = (s) => document.querySelector(s);
const listEl = $("#list"), statusEl = $("#status"), statsEl = $("#stats");
let token = sessionStorage.getItem("sandrpod_token") || "";
$("#token").value = token;
// Per-sandbox stateful code-interpreter context, created lazily so variables
// persist across "Code…" runs on the same card.
const codeContexts = {};

function headers(json) {
  const h = {};
  if (token) h["Authorization"] = "Bearer " + token;
  if (json) h["Content-Type"] = "application/json";
  return h;
}

async function api(method, path, body) {
  const resp = await fetch(path, {
    method,
    headers: headers(body !== undefined),
    body: body === undefined ? undefined : JSON.stringify(body),
  });
  const text = await resp.text();
  if (!resp.ok) throw new Error(`HTTP ${resp.status}: ${text}`);
  return text ? JSON.parse(text) : undefined;
}

function esc(s) { return String(s ?? "").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

// ---- custom modals (replace native alert / prompt / confirm) ----
function buildDialog(inner) {
  const dlg = document.createElement("dialog");
  dlg.className = "app-modal";
  dlg.innerHTML = inner;
  document.body.appendChild(dlg);
  return dlg;
}
function promptModal({ title, label = "", value = "", placeholder = "", multiline = false, ok = "OK", mono = false }) {
  return new Promise((resolve) => {
    const control = multiline
      ? `<textarea class="modal-input mono" rows="7" placeholder="${esc(placeholder)}"></textarea>`
      : `<input type="text" class="modal-input${mono ? " mono" : ""}" placeholder="${esc(placeholder)}" />`;
    const dlg = buildDialog(`<form>
      <h2>${esc(title)}</h2>
      ${label ? `<div class="modal-label">${esc(label)}</div>` : ""}
      ${control}
      ${multiline ? `<div class="modal-hint">⌘ / Ctrl + Enter to run</div>` : ""}
      <div class="dialog-actions">
        <button type="button" class="ghost" data-cancel>Cancel</button>
        <button type="submit" class="primary">${esc(ok)}</button>
      </div></form>`);
    const input = dlg.querySelector(".modal-input");
    const form = dlg.querySelector("form");
    input.value = value;
    const finish = (v) => { resolve(v); dlg.close(); dlg.remove(); };
    form.addEventListener("submit", (e) => { e.preventDefault(); finish(input.value); });
    dlg.querySelector("[data-cancel]").addEventListener("click", () => finish(null));
    dlg.addEventListener("cancel", (e) => { e.preventDefault(); finish(null); });
    if (multiline) input.addEventListener("keydown", (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === "Enter") form.requestSubmit();
    });
    dlg.showModal();
    input.focus();
    if (!multiline) input.select();
  });
}
function messageModal(title, body, { variant = "", images = [], html = "" } = {}) {
  return new Promise((resolve) => {
    const imgs = (images || []).map(png => `<img class="modal-img" src="data:image/png;base64,${png}" alt="figure" />`).join("");
    const pre = body ? `<pre class="modal-output">${esc(body)}</pre>` : "";
    // `html` is rich output from the sandbox's own code (DataFrame tables, SVG);
    // injected as-is — it is the user's own execution output, not third-party.
    const dlg = buildDialog(`<div class="modal-body-wrap">
      <h2 class="${variant === "error" ? "err" : ""}">${esc(title)}</h2>
      ${pre}${html}${imgs}
      <div class="dialog-actions"><button type="button" class="primary" data-ok>Close</button></div></div>`);
    const finish = () => { resolve(); dlg.close(); dlg.remove(); };
    dlg.querySelector("[data-ok]").addEventListener("click", finish);
    dlg.addEventListener("cancel", (e) => { e.preventDefault(); finish(); });
    dlg.showModal();
    dlg.querySelector("[data-ok]").focus();
  });
}
function confirmModal(title, message, { ok = "Confirm", danger = false } = {}) {
  return new Promise((resolve) => {
    const dlg = buildDialog(`<div class="modal-body-wrap">
      <h2>${esc(title)}</h2>
      <p class="modal-msg">${esc(message)}</p>
      <div class="dialog-actions">
        <button type="button" class="ghost" data-cancel>Cancel</button>
        <button type="button" class="${danger ? "danger-solid" : "primary"}" data-ok>${esc(ok)}</button>
      </div></div>`);
    const finish = (v) => { resolve(v); dlg.close(); dlg.remove(); };
    dlg.querySelector("[data-ok]").addEventListener("click", () => finish(true));
    dlg.querySelector("[data-cancel]").addEventListener("click", () => finish(false));
    dlg.addEventListener("cancel", (e) => { e.preventDefault(); finish(false); });
    dlg.showModal();
    dlg.querySelector("[data-ok]").focus();
  });
}

function renderStats(sandboxes) {
  const by = {};
  for (const s of sandboxes) by[s.state] = (by[s.state] || 0) + 1;
  const order = ["RUNNING", "PENDING", "STARTING", "ERROR", "STOPPED"];
  const cells = [`<div class="stat"><div class="n">${sandboxes.length}</div><div class="l">Total</div></div>`];
  for (const st of order) if (by[st]) cells.push(`<div class="stat"><div class="n">${by[st]}</div><div class="l">${st}</div></div>`);
  statsEl.innerHTML = cells.join("");
}

function card(s) {
  const st = esc(s.state);
  return `<div class="card" data-state="${st}">
    <div style="display:flex;justify-content:space-between;align-items:start;gap:8px">
      <h3>${esc(s.name)}</h3>
      <span class="pill" data-state="${st}"><span class="dot"></span>${st}</span>
    </div>
    <div class="meta">
      <span>Provider</span><b>${esc(s.provider_type || "-")}</b>
      <span>Region</span><b>${esc(s.region || "-")}</b>
      <span>IP</span><b>${esc(s.ip || "-")}</b>
      ${s.owner ? `<span>Owner</span><b>${esc(s.owner)}</b>` : ""}
    </div>
    <div class="card-actions">
      <button class="ghost" data-act="exec" data-name="${esc(s.name)}">Run…</button>
      <button class="ghost" data-act="code" data-name="${esc(s.name)}">Code…</button>
      <button class="ghost" data-act="stats" data-name="${esc(s.name)}">Stats</button>
      <button class="ghost danger" data-act="delete" data-name="${esc(s.name)}">Delete</button>
    </div>
  </div>`;
}

async function refresh() {
  statusEl.innerHTML = `<span class="spin"></span> loading`;
  try {
    const { sandboxes } = await api("GET", "/api/v1/sandboxes");
    const list = sandboxes || [];
    renderStats(list);
    listEl.innerHTML = list.length
      ? list.map(card).join("")
      : `<div class="empty">No sandboxes yet. Create one to get started.</div>`;
    statusEl.textContent = "";
  } catch (e) {
    statsEl.innerHTML = "";
    listEl.innerHTML = `<div class="notice err">${esc(e.message)}</div>`;
    statusEl.textContent = "";
  }
}

listEl.addEventListener("click", async (e) => {
  const btn = e.target.closest("button[data-act]");
  if (!btn) return;
  const name = btn.dataset.name;
  if (btn.dataset.act === "delete") {
    if (!(await confirmModal("Delete sandbox", `Delete "${name}"? This can't be undone.`, { ok: "Delete", danger: true }))) return;
    btn.disabled = true;
    try { await api("DELETE", `/api/v1/sandboxes/${encodeURIComponent(name)}`); await refresh(); }
    catch (err) { await messageModal("Error", err.message, { variant: "error" }); btn.disabled = false; }
  } else if (btn.dataset.act === "exec") {
    const cmd = await promptModal({ title: `Run — ${name}`, label: "Shell command", value: "echo hello", ok: "Run", mono: true });
    if (!cmd) return;
    try {
      const r = await api("POST", `/api/v1/sandboxes/execute?sandbox=${encodeURIComponent(name)}`,
        { language: "bash", code: cmd, timeout: 30 });
      const out = [r.stdout, r.stderr].filter(Boolean).join("\n") || "(no output)";
      await messageModal(`exit ${r.exit_code}`, out, { variant: r.exit_code ? "error" : "" });
    } catch (err) { await messageModal("Error", err.message, { variant: "error" }); }
  } else if (btn.dataset.act === "code") {
    const code = await promptModal({ title: `Code — ${name}`,
      label: "Python — stateful kernel (variables persist across runs)",
      value: "x = 40\nx + 2", multiline: true, ok: "Run", mono: true });
    if (!code) return;
    const tb = `/api/v1/sandboxes/${encodeURIComponent(name)}/toolbox`;
    try {
      if (!codeContexts[name]) {
        const ctx = await api("POST", `${tb}/code-interpreter/contexts`, { language: "python", cwd: "" });
        codeContexts[name] = ctx.id;
      }
      const r = await api("POST", `${tb}/code-interpreter/execute`, { code, context_id: codeContexts[name] });
      if (r.error) { await messageModal("Error", r.error, { variant: "error" }); }
      else {
        const parts = [];
        if (r.stdout) parts.push(`<pre class="modal-output">${esc(r.stdout)}</pre>`);
        for (const res of (r.results || [])) {
          if (res.html) parts.push(`<div class="modal-rich">${res.html}</div>`);
          else if (res.svg) parts.push(`<div class="modal-rich">${res.svg}</div>`);
          else if (res.png) parts.push(`<img class="modal-img" src="data:image/png;base64,${res.png}" alt="figure" />`);
          else if (res.jpeg) parts.push(`<img class="modal-img" src="data:image/jpeg;base64,${res.jpeg}" alt="figure" />`);
          else if (res.is_main_result && res.text) parts.push(`<pre class="modal-output">${esc(res.text)}</pre>`);
        }
        if (!parts.length) parts.push(`<pre class="modal-output">(no output)</pre>`);
        await messageModal("Result", "", { html: parts.join("") });
      }
    } catch (err) {
      delete codeContexts[name]; // context may be stale (e.g. sandbox recreated)
      await messageModal("Error", err.message, { variant: "error" });
    }
  } else if (btn.dataset.act === "stats") {
    try {
      const m = await api("GET", `/api/v1/sandboxes/${encodeURIComponent(name)}/toolbox/metrics`);
      const gib = (b) => (Number(b || 0) / 1073741824).toFixed(2) + " GiB";
      await messageModal(`Resource usage — ${name}`,
        `CPU     ${(m.cpu_used_pct || 0).toFixed(1)}%  of ${m.cpu_count || 0} cores\n` +
        `Memory  ${gib(m.mem_used)} / ${gib(m.mem_total)}\n` +
        `Disk    ${gib(m.disk_used)} / ${gib(m.disk_total)}`);
    } catch (err) { await messageModal("Error", err.message, { variant: "error" }); }
  }
});

$("#newBtn").onclick = () => $("#newDialog").showModal();
$("#cancelNew").onclick = () => $("#newDialog").close();
$("#refreshBtn").onclick = refresh;
$("#saveToken").onclick = () => {
  token = $("#token").value.trim();
  sessionStorage.setItem("sandrpod_token", token);
  refresh();
};

$("#newForm").addEventListener("submit", async (e) => {
  const submitter = e.submitter;
  if (submitter && submitter.value === "cancel") return;
  e.preventDefault();
  const fd = new FormData(e.target);
  const body = { name: fd.get("name"), provider_type: fd.get("provider_type"),
                 region: fd.get("region") || "local", async: true };
  if (fd.get("instance_type")) body.instance_type = fd.get("instance_type");
  if (fd.get("image_id")) body.image_id = fd.get("image_id");
  try {
    await api("POST", "/api/v1/sandboxes", body);
    $("#newDialog").close();
    e.target.reset();
    await refresh();
  } catch (err) { await messageModal("Error", err.message, { variant: "error" }); }
});

refresh();
setInterval(refresh, 15000);
</script>
</body>
</html>
